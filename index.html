    /**
     * Converte una data dal formato YYYY-MM-DD o gg/mm/aaaa al formato ISO YYYY-MM-DD
     * @param {string} dateStr - Data in formato YYYY-MM-DD o gg/mm/aaaa
     * @returns {string} Data in formato YYYY-MM-DD
     */
    function convertDateToISO(dateStr) {
      if (!dateStr) return '';
      
      // Se è già in formato YYYY-MM-DD, restituiscila così com'è
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
        return dateStr;
      }
      
      // Se è in formato gg/mm/aaaa, convertila
      if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)) {
        const parts = dateStr.split('/');
        const day = parts[0].padStart(2, '0');
        const month = parts[1].padStart(2, '0');
        const year = parts[2];
        return year + '-' + month + '-' + day;
      }
      
      // Altrimenti prova a parsare come Date object
      const date = new Date(dateStr);
      if (!isNaN(date.getTime())) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return year + '-' + month + '-' + day;
      }
      
      console.error('Formato data non riconosciuto:', dateStr);
      return dateStr;
    }

    function calculateNights(checkIn, checkOut) {
      const oneDay = 24 * 60 * 60 * 1000;
      return Math.round((checkOut - checkIn) / oneDay);
    }
    
    function validateOperationalMonths(checkIn, checkOut) {
      if (CONFIG.operationalMonths.length === 0) {
        return { valid: true };
      }
      
      const current = new Date(checkIn);
      const invalidMonths = [];
      
      while (current < checkOut) {
        const month = current.getMonth() + 1;
        if (!CONFIG.operationalMonths.includes(month)) {
          const monthName = new Date(2000, month - 1, 1).toLocaleDateString('it-IT', { month: 'long' });
          if (!invalidMonths.includes(monthName)) {
            invalidMonths.push(monthName);
          }
        }
        current.setDate(current.getDate() + 1);
      }
      
      if (invalidMonths.length > 0) {
        return {
          valid: false,
          message: 'Mesi non operativi: ' + invalidMonths.join(', ')
        };
      }
      
      return { valid: true };
    }
    
    function calculateBasePrice(checkIn, checkOut) {
      // Prezzo base FISSO: sempre 4 adulti × prezzo/notte × notti
      let total = 0;
      const current = new Date(checkIn);
      
      while (current < checkOut) {
        const month = current.getMonth() + 1;
        const pricePerNight = CONFIG.monthlyPrices[month] || 0;
        
        // Prezzo base fisso per 4 adulti
        total += CONFIG.minPeople * pricePerNight;
        
        current.setDate(current.getDate() + 1);
      }
      
      return Math.round(total);
    }
    
    function calculateTotalBeds(numAdults, numChildren) {
      // Posti letto totali occupati
      return numAdults + numChildren;
    }
    
    function calculateSupplement(checkIn, checkOut, numAdults, numChildren) {
      const totalBeds = calculateTotalBeds(numAdults, numChildren);
      
      // Supplementi solo se si superano i 4 posti letto
      if (totalBeds <= CONFIG.minPeople) {
        return { adults: 0, children: 0, total: 0 };
      }
      
      // Calcola quanti posti letto extra ci sono
      const extraBeds = totalBeds - CONFIG.minPeople;
      
      // Prima copriamo gli adulti extra, poi i bambini
      const extraAdults = Math.max(0, numAdults - CONFIG.minPeople);
      const extraChildren = Math.max(0, extraBeds - extraAdults);
      
      let adultSupplement = 0;
      let childSupplement = 0;
      
      // Supplemento adulti (PER SOGGIORNO)
      if (extraAdults > 0) {
        const current = new Date(checkIn);
        const months = [];
        
        while (current < checkOut) {
          const month = current.getMonth() + 1;
          if (!months.includes(month)) {
            months.push(month);
          }
          current.setDate(current.getDate() + 1);
        }
        
        const avgAdultSurcharge = months.reduce(function(sum, month) {
          return sum + (CONFIG.extraAdultSurchargeByMonth[month] || 20);
        }, 0) / months.length;
        
        adultSupplement = Math.round(extraAdults * avgAdultSurcharge);
      }
      
      // Supplemento bambini (PER SOGGIORNO)
      if (extraChildren > 0) {
        childSupplement = extraChildren * CONFIG.extraChildSurcharge;
      }
      
      return {
        adults: adultSupplement,
        children: childSupplement,
        total: adultSupplement + childSupplement
      };
    }
    
    function findApplicableDiscount(nights) {
      for (let i = 0; i < CONFIG.discounts.length; i++) {
        if (nights >= CONFIG.discounts[i].minNights) {
          return CONFIG.discounts[i];
        }
      }
      return null;
    }
    
    function calculateQuote(checkInDate, checkOutDate, numAdults, numChildren) {
      const errors = [];
      
      if (!checkInDate || !checkOutDate) {
        errors.push('Inserire date di check-in e check-out');
      }
      
      const checkIn = new Date(checkInDate);
      const checkOut = new Date(checkOutDate);
      
      if (checkOut <= checkIn) {
        errors.push('Check-out deve essere dopo check-in');
      }
      
      const nights = calculateNights(checkIn, checkOut);
      
      if (nights < CONFIG.minNights) {
        errors.push('Minimo ' + CONFIG.minNights + ' notti (selezionate: ' + nights + ')');
      }
      
      const monthValidation = validateOperationalMonths(checkIn, checkOut);
      if (!monthValidation.valid) {
        errors.push(monthValidation.message);
      }
      
      if (!numAdults || numAdults < 1) {
        errors.push('Inserire almeno 1 adulto');
      }
      
      if (numChildren < 0) {
        errors.push('Numero bambini non valido');
      }
      
      if (errors.length > 0) {
        return { success: false, errors: errors };
      }
      
      const totalBeds = calculateTotalBeds(numAdults, numChildren);
      
      // Calcola prezzo base FISSO (sempre 4 adulti)
      const basePrice = calculateBasePrice(checkIn, checkOut);
      
      // Calcola supplementi (solo se > 4 posti letto)
      const supplement = calculateSupplement(checkIn, checkOut, numAdults, numChildren);
      
      const subtotal = basePrice + supplement.total;
      
      const discount = findApplicableDiscount(nights);
      let discountAmount = 0;
      let discountPercentage = 0;
      
      if (discount) {
        discountPercentage = discount.percentage;
        discountAmount = Math.round(subtotal * (discountPercentage / 100));
      }
      
      const finalTotal = subtotal - discountAmount;
      
      const formatDate = function(date) {
        return date.toLocaleDateString('it-IT', { 
          day: 'numeric', 
          month: 'long', 
          year: 'numeric' 
        });
      };
      
      return {
        success: true,
        data: {
          period: formatDate(checkIn) + ' - ' + formatDate(checkOut),
          nights: nights,
          numAdults: numAdults,
          numChildren: numChildren,
          totalBeds: totalBeds,
          basePrice: basePrice,
          adultSupplement: supplement.adults,
          childSupplement: supplement.children,
          totalSupplement: supplement.total,
          discountAmount: discountAmount,
          discountPercentage: discountPercentage,
          finalTotal: finalTotal
        }
      };
    }

      return date1.getFullYear() === date2.getFullYear() &&
             date1.getMonth() === date2.getMonth() &&

    }
    
    function isDateInRange(date, start, end) {
      if (!start || !end) return false;
      return date >= start && date <= end;

      const lastDay = new Date(year, month + 1, 0);
      const startingDayOfWeek = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      
      const prevMonth = function() {
        setCurrentMonth(new Date(year, month - 1, 1));
      };
      
      const nextMonth = function() {
        setCurrentMonth(new Date(year, month + 1, 1));

                  React.createElement(TextField, {
                    fullWidth: true,
                    label: 'Adulti',
                    type: 'number',
                    value: numAdults,
                    onChange: function(e) { setNumAdults(e.target.value); },
                    inputProps: { min: 1 },
                    required: true
                  })
                ),
                
                React.createElement(Grid, { item: true, xs: 12, sm: 6, md: 3 },
                  React.createElement(TextField, {
                    fullWidth: true,
                    label: 'Bambini (0-12 anni)',
                    type: 'number',
                    value: numChildren,
                    onChange: function(e) { setNumChildren(e.target.value); },
                    inputProps: { min: 0 },
                    helperText: 'Metà prezzo, 1 posto letto'
                  })
                ),
                
                React.createElement(Grid, { item: true, xs: 12 },
                  React.createElement(Box, { sx: { display: 'flex', gap: 2 } },
                    React.createElement(Button, {
                      variant: 'contained',
                      size: 'large',
                      onClick: handleCalculate,
                      sx: { minWidth: 200 }
                    }, 'Calcola Preventivo'),
                    
                    React.createElement(Button, {
                      variant: 'outlined',
                      size: 'large',
                      onClick: handleReset
                    }, 'Reset')
                  )
                )
              )
            ),
            
            errors.length > 0 && React.createElement(Box, { sx: { mb: 3 } },
              errors.map(function(error, index) {
                return React.createElement(Alert, {
                  key: index,
                  severity: 'error',
                  sx: { mb: 1 }
                }, error);
              })
            ),
            
            quoteResult && React.createElement(Paper, { sx: { p: 3 } },
              React.createElement(Box, { sx: { display: 'flex', alignItems: 'center', mb: 3 } },
                React.createElement(Typography, {
                  variant: 'h6',
                  sx: { flexGrow: 1 }
                }, 'Riepilogo Preventivo'),
                
                React.createElement(Chip, {
                  label: 'Preventivo Calcolato',
                  color: 'success',
                  size: 'small'
                })
              ),
              
              React.createElement(Grid, { container: true, spacing: 2 },
                React.createElement(Grid, { item: true, xs: 12, sm: 6, md: 4 },
                  React.createElement(MetricCard, {
                    label: 'Periodo',
                    value: quoteResult.period
                  })
                ),
                
                React.createElement(Grid, { item: true, xs: 12, sm: 6, md: 4 },
                  React.createElement(MetricCard, {
                    label: 'Notti',
                    value: quoteResult.nights
                  })
                ),
                
                React.createElement(Grid, { item: true, xs: 12, sm: 6, md: 4 },
                  React.createElement(MetricCard, {
                    label: 'Ospiti',
                    value: quoteResult.numAdults + ' adulti' + (quoteResult.numChildren > 0 ? ', ' + quoteResult.numChildren + ' bambini' : ''),
                    info: quoteResult.totalBeds + ' posti letto occupati'
                  })
                ),
                
                React.createElement(Grid, { item: true, xs: 12, sm: 6, md: 4 },
                  React.createElement(MetricCard, {
                    label: 'Prezzo Base',
                    value: quoteResult.basePrice + '€',
                    info: 'Tariffa fissa per 4 adulti'
                  })
                ),
                
                quoteResult.totalSupplement > 0 && React.createElement(Grid, { item: true, xs: 12, sm: 6, md: 4 },
                  React.createElement(MetricCard, {
                    label: 'Supplementi',
                    value: quoteResult.totalSupplement + '€',
                    info: (quoteResult.adultSupplement > 0 ? 'Adulti: ' + quoteResult.adultSupplement + '€' : '') + 
                          (quoteResult.childSupplement > 0 ? (quoteResult.adultSupplement > 0 ? ', ' : '') + 'Bambini: ' + quoteResult.childSupplement + '€' : '')
                  })
                ),
                
                React.createElement(Grid, { item: true, xs: 12, sm: 6, md: 4 },
                  React.createElement(MetricCard, {
                    label: 'Sconto',
                    value: quoteResult.discountAmount > 0 
                      ? '-' + quoteResult.discountAmount + '€ (' + quoteResult.discountPercentage + '%)'
                      : '0€'
                  })
                ),
                
                React.createElement(Grid, { item: true, xs: 12 },
                  React.createElement(MetricCard, {
                    label: 'TOTALE FINALE',
                    value: quoteResult.finalTotal + '€',
                    highlight: true
                  })
                )
              ),
              
              React.createElement(Divider, { sx: { my: 3 } }),
              
              React.createElement(Typography, {
                variant: 'caption',
                color: 'text.secondary',
                component: 'div'
              },
                'Configurazione: Min ' + CONFIG.minNights + ' notti | Tariffa base fissa: ' + CONFIG.minPeople + ' adulti | Bambini 0-' + CONFIG.childAge + ' anni (1 posto letto) | Supplemento adulto extra: 20-25€/soggiorno | Supplemento bambino extra: ' + CONFIG.extraChildSurcharge + '€/soggiorno'
              )
            )
          ),
          
          activeTab === 1 && React.createElement(Box, null,
            React.createElement(Box, { sx: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 3, flexWrap: 'wrap', gap: 2 } },
              React.createElement(Typography, { variant: 'h4' }, 'Calendario Prenotazioni'),
              React.createElement(Box, { sx: { display: 'flex', gap: 1 } },
                React.createElement(Button, {
                  variant: 'outlined',
                  onClick: handleRefreshBookings,
                  disabled: loading,
                  startIcon: React.createElement('span', { className: 'material-icons' }, 'refresh')
                }, 'Aggiorna'),
                React.createElement(Button, {
                  variant: 'contained',
                  onClick: handleNewBooking,
                  startIcon: React.createElement('span', { className: 'material-icons' }, 'add')
                }, 'Nuova')
              )
            ),
            
            loading && React.createElement(Box, { sx: { display: 'flex', justifyContent: 'center', py: 4 } },
              React.createElement(CircularProgress, null)
            ),
            
            !loading && React.createElement(Grid, { container: true, spacing: 3 },
              React.createElement(Grid, { item: true, xs: 12, md: 7 },
                React.createElement(Paper, { sx: { p: 3 } },
                  React.createElement(CalendarView, {
                    bookings: bookings,
                    selectedRange: selectedRange
                  })
                )
              ),
              
              React.createElement(Grid, { item: true, xs: 12, md: 5 },
                React.createElement(Paper, { sx: { p: 3 } },
                  React.createElement(Typography, { variant: 'h6', gutterBottom: true }, 'Prenotazioni'),
                  
                  bookings.length === 0 && React.createElement(Typography, {
                    variant: 'body2',
                    color: 'text.secondary',
                    sx: { textAlign: 'center', py: 4 }
                  }, 'Nessuna prenotazione'),
                  
                  bookings.length > 0 && React.createElement(List, null,
                    bookings.sort(function(a, b) {
                      return new Date(a.checkIn) - new Date(b.checkIn);
                    }).map(function(booking) {
                      const checkIn = new Date(booking.checkIn).toLocaleDateString('it-IT', { 
                        day: 'numeric', 
                        month: 'short' 
                      });
                      const checkOut = new Date(booking.checkOut).toLocaleDateString('it-IT', { 
                        day: 'numeric', 
                        month: 'short' 
                      });
                      const totalPeople = booking.numAdults + booking.numChildren;
                      const peopleText = booking.numAdults + 'A' + (booking.numChildren > 0 ? ' + ' + booking.numChildren + 'B' : '');
                      
                      return React.createElement(ListItem, {
                        key: booking.id,
                        sx: {
                          border: '1px solid #ddd',
                          borderRadius: 1,
                          mb: 1,
                          backgroundColor: booking.depositPaid ? '#c8e6c9' : '#fff9c4'
                        }
                      },
                        React.createElement(ListItemText, {
                          primary: booking.guestName,
                          secondary: checkIn + ' - ' + checkOut + ' (' + peopleText + ')'
                        }),
                        React.createElement(ListItemSecondaryAction, null,
                          React.createElement(IconButton, {
                            size: 'small',
                            onClick: function() { handleToggleDeposit(booking.id); },
                            title: booking.depositPaid ? 'Segna anticipo non ricevuto' : 'Segna anticipo ricevuto',
                            disabled: loading
                          },
                            React.createElement('span', {
                              className: 'material-icons',
                              style: { color: booking.depositPaid ? '#4caf50' : '#fbc02d' }
                            }, booking.depositPaid ? 'check_circle' : 'pending')
                          ),
                          React.createElement(IconButton, {
                            size: 'small',
                            onClick: function() { handleEditBooking(booking); },
                            disabled: loading
                          },
                            React.createElement('span', { className: 'material-icons' }, 'edit')
                          ),
                          React.createElement(IconButton, {
                            size: 'small',
                            onClick: function() { handleDeleteBooking(booking.id); },
                            disabled: loading
                          },
                            React.createElement('span', { className: 'material-icons' }, 'delete')
                          )
                        )
                      );
                    })
                  )
                )
              )
            )
          )
        ),
        
        React.createElement(BookingDialog, {
          open: bookingDialogOpen,
          onClose: function() { setBookingDialogOpen(false); setEditingBooking(null); },
          onSave: handleSaveBooking,
          initialData: editingBooking
        }),
        
        React.createElement(Snackbar, {
          open: snackbar.open,
          autoHideDuration: 6000,
          onClose: function() { setSnackbar({ open: false, message: '', severity: 'info' }); },
          anchorOrigin: { vertical: 'bottom', horizontal: 'center' }
        },
          React.createElement(Alert, {
            onClose: function() { setSnackbar({ open: false, message: '', severity: 'info' }); },
            severity: snackbar.severity,
            sx: { width: '100%' }
          }, snackbar.message)
        )
      );
    };
    
    // ============================================
    // RENDER
    // ============================================
    
    try {
      const rootElement = document.getElementById('root');
      
      if (!rootElement) {
        throw new Error('Root element not found');
      }
      
      const root = ReactDOM.createRoot(rootElement);
      root.render(React.createElement(QuoteGenerator));
      
      console.log('✅ App rendered');
      console.log('Backend API:', BACKEND_CONFIG.apiUrl);
      
    } catch (error) {
      console.error(' Render error:', error);
      alert('Errore: ' + error.message);
    }
  </script>
</body>
</html>
